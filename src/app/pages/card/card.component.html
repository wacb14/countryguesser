<div class="bg-cg-bg flex min-h-screen justify-center p-0">
  <div class="mx-0 flex min-h-screen w-full max-w-7xl items-center max-sm:px-2">
    <div class="bg-cg-panel mx-auto w-full rounded-lg pb-3 max-sm:rounded-none">
      <app-header
        [score]="score"
        [questions]="[currentIndex + 1, questions.length]"
      ></app-header>
      <app-viewer></app-viewer>
      <app-alternatives-viewer></app-alternatives-viewer>
      <div class="h-14">
        @if (!showBtnResults) {
          <div
            class="m-0 flex justify-center"
            [ngClass]="!showBtnNext ? 'hidden' : ''"
          >
            <button
              class="bg-cg-primary text-cg-text hover:bg-cg-primary-hover flex h-12 w-40 cursor-pointer items-center justify-around rounded-lg border-0 p-2 text-lg disabled:cursor-not-allowed"
              (click)="nextQuestion()"
              [disabled]="!showBtnNext"
            >
              {{ "card.next" | translate }}
            </button>
          </div>
        } @else {
          <div class="m-0 flex justify-center">
            <button
              class="bg-cg-primary text-cg-text hover:bg-cg-primary-hover flex h-12 w-44 cursor-pointer items-center justify-center gap-2 rounded-lg border-0 p-2 text-lg"
              (click)="goScoreboard()"
              [disabled]="!showBtnResults"
            >
              <p>{{ "card.seeResults" | translate }}</p>
              <i class="iconify text-2xl" data-icon="ep:right"></i>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
